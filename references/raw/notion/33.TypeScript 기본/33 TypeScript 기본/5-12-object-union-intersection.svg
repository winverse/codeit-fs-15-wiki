<svg width="860" height="410" viewBox="0 0 860 410" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #222; }
    .title { font-size: 22px; font-weight: 700; }
    .desc { font-size: 13px; fill: #555; }
    .label { font-size: 16px; font-weight: 700; }
    .body { font-size: 13px; }
    .note { font-size: 12px; fill: #666; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="860" height="410" fill="#fff"/>
  <text x="36" y="40" class="title">Intersection은 조건을 겹쳐 더 구체적인 객체를 만듭니다</text>
  <text x="36" y="64" class="desc">두 집합을 동시에 만족하는 값만 남기므로, 허용 가능한 객체는 더 구체적으로 좁혀집니다.</text>

  <g transform="translate(72 118)">
    <rect x="0" y="0" width="250" height="118" rx="16" fill="none" stroke="#222" stroke-width="1.8"/>
    <text x="125" y="34" text-anchor="middle" class="label">HasName</text>
    <text x="125" y="58" text-anchor="middle" class="note">이름을 가진 객체들의 집합</text>
    <text x="46" y="92" class="body">name: string</text>
  </g>

  <g transform="translate(538 118)">
    <rect x="0" y="0" width="250" height="118" rx="16" fill="none" stroke="#222" stroke-width="1.8"/>
    <text x="125" y="34" text-anchor="middle" class="label">HasPrice</text>
    <text x="125" y="58" text-anchor="middle" class="note">가격을 가진 객체들의 집합</text>
    <text x="46" y="92" class="body">price: number</text>
  </g>

  <line x1="322" y1="236" x2="430" y2="286" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="538" y1="236" x2="430" y2="286" stroke="#555" stroke-width="1.6" marker-end="url(#arrow)"/>

  <g transform="translate(280 236)">
    <rect x="0" y="50" width="300" height="92" rx="16" fill="none" stroke="#222" stroke-width="1.8"/>
    <text x="150" y="78" text-anchor="middle" class="label">ProductPreview</text>
    <text x="54" y="106" class="body">name: string</text>
    <text x="54" y="128" class="body">price: number</text>
  </g>
</svg>
